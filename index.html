<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moment Stream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; padding: 24px; }
    h1 { font-size: 1.2rem; font-weight: 600; color: #94a3b8; margin-bottom: 20px; letter-spacing: 0.05em; text-transform: uppercase; }
    #status { font-size: 0.75rem; color: #64748b; margin-bottom: 24px; }
    #status.connected { color: #22c55e; }
    .session { margin-bottom: 32px; }
    .session-header { font-size: 0.7rem; color: #64748b; font-family: monospace; margin-bottom: 8px; }
    .ctx-badge { font-style: italic; color: #1e3a4a; margin-left: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 6px 12px; color: #64748b; font-weight: 500; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #1e293b; }
    td { padding: 8px 12px; border-bottom: 1px solid #1e293b; vertical-align: top; }
    td.time { color: #94a3b8; font-family: monospace; white-space: nowrap; width: 80px; }
    td.rec  { color: #64748b; font-family: monospace; white-space: nowrap; width: 50px; text-align: right; }
    td.spoken { color: #93c5fd; width: 35%; }
    td.visible { color: #86efac; width: 35%; }
    td.ctx { color: #c4b5fd; width: 30%; }
    td.spoken div, td.visible div, td.ctx div { max-height: calc(5 * 1.5em); overflow-y: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .empty-hint { color: #253345; font-style: italic; }
    .session.no-ctx th.ctx-col,
    .session.no-ctx td.ctx { display: none; }
    tr.new { animation: flash 1s ease-out; }
    @keyframes flash { from { background: #1e3a5f; } to { background: transparent; } }
    #empty { color: #334155; font-size: 0.9rem; margin-top: 40px; text-align: center; }
  </style>
</head>
<body>
  <h1>Moment Stream</h1>
  <div id="status">Connecting…</div>
  <div id="sessions"></div>
  <div id="empty">Waiting for moments…</div>

  <script>
    const statusEl = document.getElementById('status')
    const sessionsEl = document.getElementById('sessions')
    const emptyEl = document.getElementById('empty')

    // sessionId → { headerEl, tbodyEl }
    const sessionTables = new Map()
    // tracks already-rendered moment IDs to avoid duplicates on SSE reconnect
    const renderedMoments = new Set()

    function formatCapturedAt (capturedAt) {
      if (!capturedAt && capturedAt !== 0) return '—'
      let ms
      if (typeof capturedAt === 'string') ms = new Date(capturedAt).getTime()
      else ms = capturedAt > 1e12 ? capturedAt : capturedAt * 1000
      if (isNaN(ms)) return '—'
      return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
    }

    function getOrCreateTable (masterSessionId) {
      if (sessionTables.has(masterSessionId)) return sessionTables.get(masterSessionId)

      emptyEl.style.display = 'none'

      const div = document.createElement('div')
      div.className = 'session no-ctx'

      const header = document.createElement('div')
      header.className = 'session-header'
      header.appendChild(document.createTextNode(`Session: ${masterSessionId}`))
      const ctxBadge = document.createElement('span')
      ctxBadge.className = 'ctx-badge'
      ctxBadge.textContent = '· no context'
      header.appendChild(ctxBadge)

      const table = document.createElement('table')
      table.innerHTML = `<thead><tr><th>Time</th><th>Rec #</th><th>Spoken</th><th>Visible</th><th class="ctx-col">Context</th></tr></thead>`
      const tbody = document.createElement('tbody')
      table.appendChild(tbody)

      div.appendChild(header)
      div.appendChild(table)
      sessionsEl.prepend(div)

      sessionTables.set(masterSessionId, { div, tbody, ctxBadge, hasContext: false })
      return sessionTables.get(masterSessionId)
    }

    function ensureContextVisible (sessionData) {
      if (sessionData.hasContext) return
      sessionData.hasContext = true
      sessionData.div.classList.remove('no-ctx')
      sessionData.ctxBadge.style.display = 'none'
    }

    function renderChunk ({ masterSessionId, chunkIndex, capturedAt, moments, context }) {
      const sessionData = getOrCreateTable(masterSessionId)
      const { tbody } = sessionData
      if (!moments?.length) return

      if (context != null) ensureContextVisible(sessionData)

      const timeStr = formatCapturedAt(capturedAt)
      const recStr  = chunkIndex != null ? `#${chunkIndex + 1}` : '—'

      for (const m of moments) {
        const key = `${masterSessionId}:${m.id}`
        if (renderedMoments.has(key)) continue
        renderedMoments.add(key)

        const tr = document.createElement('tr')
        tr.className = 'new'
        tr.dataset.chunkIndex = chunkIndex ?? Infinity

        const tdTime = document.createElement('td')
        tdTime.className = 'time'
        tdTime.textContent = timeStr

        const tdRec = document.createElement('td')
        tdRec.className = 'rec'
        tdRec.textContent = recStr

        const tdSpoken = document.createElement('td')
        tdSpoken.className = 'spoken'
        const divSpoken = document.createElement('div')
        if (m.spokenText) {
          divSpoken.textContent = m.spokenText
        } else {
          const hint = document.createElement('span')
          hint.className = 'empty-hint'
          hint.textContent = 'no audio'
          divSpoken.appendChild(hint)
        }
        tdSpoken.appendChild(divSpoken)

        const tdVisible = document.createElement('td')
        tdVisible.className = 'visible'
        const divVisible = document.createElement('div')
        if (m.visibleText) {
          divVisible.textContent = m.visibleText
        } else {
          const hint = document.createElement('span')
          hint.className = 'empty-hint'
          hint.textContent = 'no vision'
          divVisible.appendChild(hint)
        }
        tdVisible.appendChild(divVisible)

        const tdCtx = document.createElement('td')
        tdCtx.className = 'ctx'
        const divCtx = document.createElement('div')
        if (context != null) {
          divCtx.textContent = typeof context === 'string' ? context : JSON.stringify(context)
        } else {
          const hint = document.createElement('span')
          hint.className = 'empty-hint'
          hint.textContent = 'no context'
          divCtx.appendChild(hint)
        }
        tdCtx.appendChild(divCtx)

        tr.appendChild(tdTime)
        tr.appendChild(tdRec)
        tr.appendChild(tdSpoken)
        tr.appendChild(tdVisible)
        tr.appendChild(tdCtx)

        let inserted = false
        for (const existingRow of tbody.rows) {
          if (chunkIndex < Number(existingRow.dataset.chunkIndex)) {
            tbody.insertBefore(tr, existingRow)
            inserted = true
            break
          }
        }
        if (!inserted) tbody.appendChild(tr)
        setTimeout(() => tr.classList.remove('new'), 1000)
      }
    }

    function connect () {
      const es = new EventSource('/stream')

      es.onopen = () => {
        statusEl.textContent = 'Connected — live'
        statusEl.className = 'connected'
      }

      es.onmessage = e => {
        try { renderChunk(JSON.parse(e.data)) } catch {}
      }

      es.onerror = () => {
        statusEl.textContent = 'Reconnecting…'
        statusEl.className = ''
        es.close()
        setTimeout(connect, 3000)
      }
    }

    connect()
  </script>
</body>
</html>
